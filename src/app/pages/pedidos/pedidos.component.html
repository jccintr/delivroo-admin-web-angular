<div class="p-6 lg:p-8 min-h-screen bg-gray-50">
  <div class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div class="mb-8">
        <h1 class="text-2xl lg:text-3xl font-bold text-gray-800">Pedidos</h1>
        <p class="text-gray-600 mt-1">Gerencie os pedidos da sua loja</p>
      </div>
      <button 
            (click)="refresh()"
            class="inline-flex items-center px-5 py-2.5 bg-primary text-white font-medium rounded-lg shadow-sm hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition">
            <span class="material-icons mr-2 text-lg">refresh</span>
            Atualizar
        </button>
  </div>
  

  <app-table-pedidos 
    [pedidos]="pedidos"
    [loading]="loading"
  ></app-table-pedidos>

  
  
</div>
