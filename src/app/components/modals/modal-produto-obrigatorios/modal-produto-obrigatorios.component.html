<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Overlay -->
  <div 
    class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity duration-300"
    (click)="onClose()"
  ></div>

  <!-- Modal -->
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden z-10 relative max-h-[90vh] flex flex-col">
    
    <!-- Cabeçalho -->
    <div class="px-6 py-5 border-b border-gray-200 flex items-center justify-between">
      <div>
        <h2 class="text-xl font-semibold text-gray-800">
          Selecionáveis do Produto
        </h2>
        <p class="text-sm text-gray-500 mt-1">
          {{ produtoNome || 'Produto' }} • Selecione os itens selecionáveis disponíveis
        </p>
      </div>
    </div>

    <!-- Corpo - Lista de adicionais -->
    <div class="p-6 flex-1 overflow-y-auto">
      
      <!-- Loading -->
      <div *ngIf="loading" class="text-center py-12 text-gray-500">
        <span class="material-icons animate-spin text-3xl">autorenew</span>
        <p class="mt-3">Carregando selecionáveis...</p>
      </div>

      <!-- Erro -->
      <div *ngIf="errorMessage && !loading" class="text-red-600 bg-red-50 p-4 rounded-lg text-center">
        {{ errorMessage }}
      </div>

      <!-- Lista vazia -->
      <div *ngIf="!loading && obrigatorios.length === 0" class="text-center py-12 text-gray-500">
        <span class="material-icons text-4xl text-gray-400">inventory_2</span>
        <p class="mt-3">Nenhum selecionável cadastrado no sistema ainda.</p>
      </div>

      <!-- Lista de selecionáveis -->
      <div *ngIf="!loading && obrigatorios.length > 0" class="space-y-1">
        <div *ngFor="let obrigatorio of obrigatorios" 
             class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 rounded-lg transition-colors group">
          
          <div class="flex items-center gap-3 flex-1">
            <input 
              type="checkbox"
              [id]="'obrigatorio-' + obrigatorio.id"
              [checked]="associados.has(obrigatorio.id)"
              (change)="toggleObrigatorio(obrigatorio)"
              class="h-5 w-5 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 cursor-pointer"
            />
            <label 
              [for]="'obrigatorio-' + obrigatorio.id"
              class="text-gray-900 cursor-pointer flex-1"
            >
              {{ obrigatorio.nome }}
            </label>
          </div>

          <!-- Indicador visual de salvando (opcional) -->
          <span *ngIf="salvandoIds.has(obrigatorio.id)" 
                class="material-icons animate-spin text-indigo-600 text-xl">
            autorenew
          </span>
        </div>
      </div>
    </div>

    <!-- Rodapé -->
    <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex justify-end">
      <button 
        (click)="onClose()"
        type="button"
        class="px-6 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium transition-colors flex items-center gap-2"
        [disabled]="isAnySaving()"
      >
        @if (isAnySaving()) {
          <span class="material-icons animate-spin">autorenew</span>
          Processando...
        } @else {
          Fechar
        }
      </button>
    </div>
  </div>
</div>
