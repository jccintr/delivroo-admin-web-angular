<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Overlay -->
  <div 
    class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity duration-300"
    (click)="onClose()"
  ></div>

  <!-- Modal -->
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden z-10 relative">
    
    <!-- Cabeçalho -->
    <div class="px-6 py-5 border-b border-gray-200 flex items-center gap-3">
      <span class="material-icons text-red-600 text-3xl">error_outline</span>
      <h2 class="text-xl font-semibold text-gray-800">
        {{ title }}
      </h2>
    </div>

    <!-- Corpo -->
    <div class="p-6">
      <p class="text-gray-700 leading-relaxed">{{ message }}</p>

      
    </div>

    <!-- Rodapé -->
    <div class="px-6 py-4 bg-gray-50 flex justify-end border-t border-gray-200">
      <button 
        (click)="onClose()"
        type="button"
        class="px-6 py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition"
      >
        Fechar
      </button>
    </div>
  </div>
</div>
