<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Overlay -->
  <div 
    class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity duration-300"
    (click)="onCancel()"
  ></div>

  <!-- Modal -->
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden z-10 relative">
    
    <!-- Cabeçalho -->
    <div class="px-6 py-5 border-b border-gray-200">
      <h2 class="text-xl font-semibold text-gray-800">
        Novo Produto
      </h2>
      <p class="text-sm text-gray-500 mt-1">
        Adicione um novo item ao cardápio da sua loja
      </p>
    </div>

    <!-- Corpo -->
    <div class="p-6 space-y-6 max-h-[70vh] overflow-y-auto">

      <!-- Nome -->
      <div>
        <label for="nome" class="block text-sm font-medium text-gray-700 mb-2">
          Nome do produto <span class="text-red-500">*</span>
        </label>
        <input 
          id="nome"
          type="text"
          [(ngModel)]="nome"
          placeholder="Ex: Hambúrguer Clássico"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
          required
          maxlength="100"
        />
      </div>

      <!-- Descrição -->
      <div>
        <label for="descricao" class="block text-sm font-medium text-gray-700 mb-2">
          Descrição
        </label>
        <textarea 
          id="descricao"
          [(ngModel)]="descricao"
          rows="3"
          placeholder="Ingredientes, observações, etc..."
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-none"
        ></textarea>
      </div>

      <!-- Preço -->
      <div>
        <label for="preco" class="block text-sm font-medium text-gray-700 mb-2">
          Preço (R$) <span class="text-red-500">*</span>
        </label>
        <input 
          id="preco"
          type="number"
          step="0.01"
          min="0.01"
          [(ngModel)]="preco"
          placeholder="0,00"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
          required
        />
      </div>

      <!-- Categoria -->
      <div>
        <label for="categoria" class="block text-sm font-medium text-gray-700 mb-2">
          Categoria <span class="text-red-500">*</span>
        </label>
        <select 
          id="categoria"
          [(ngModel)]="categoria_id"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white"
          required
        >
          <option value="" disabled>Selecione uma categoria</option>
          @for (cat of categorias; track cat.id) {
            <option [value]="cat.id">{{ cat.nome }}</option>
          }
        </select>

        @if (loadingCategorias) {
          <p class="text-sm text-gray-500 mt-1">Carregando categorias...</p>
        }
      </div>

      <!-- Imagem -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Imagem do produto
        </label>

        @if (!imagemPreview) {
          <div 
            class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-indigo-500 transition-colors cursor-pointer"
            (dragover)="onDragOver($event)"
            (drop)="onDrop($event)"
          >
            <input 
              type="file" 
              accept="image/*" 
              (change)="onFileSelected($event)" 
              class="hidden" 
              id="fileInput"
            />
            <label for="fileInput" class="cursor-pointer">
              <span class="material-icons text-5xl text-gray-400">cloud_upload</span>
              <p class="mt-2 text-sm text-gray-600">
                Clique para selecionar ou arraste uma imagem aqui
              </p>
              <p class="text-xs text-gray-500 mt-1">
                PNG, JPG, WEBP (máx. 5MB recomendado)
              </p>
            </label>
          </div>
        } @else {
          <div class="relative">
            <img 
              [src]="imagemPreview" 
              alt="Pré-visualização" 
              class="w-full h-48 object-cover rounded-lg border border-gray-200"
            />
            <button 
              (click)="removeImage()"
              class="absolute top-2 right-2 bg-red-600 text-white rounded-full p-1.5 hover:bg-red-700 transition flex items-center"
              title="Remover imagem"
            >
              <span class="material-icons text-sm">close</span>
            </button>
          </div>
        }
      </div>

      <!-- Erro -->
      @if (errorMessage) {
        <div class="text-red-600 text-sm bg-red-50 p-3 rounded-lg">
          {{ errorMessage }}
        </div>
      }
    </div>

    <!-- Rodapé -->
    <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3 border-t border-gray-200">
      <button 
        (click)="onCancel()"
        type="button"
        class="px-5 py-2.5 text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 font-medium transition-colors"
        [disabled]="isSaving()"
      >
        Cancelar
      </button>
      
      <button 
        (click)="onSave()"
        [disabled]="isSaving() || !nome.trim() || !categoria_id || preco === null || preco <= 0"
        type="button"
        class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
      >
        @if (isSaving()) {
          <span class="material-icons animate-spin text-xl">autorenew</span>
          Salvando...
        } @else { 
          Salvar Produto
        }
      </button>
    </div>
  </div>
</div>
